<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Varela+Round&display=swap" rel="stylesheet">
    <title>InkStream - Your Cart</title>
    <link rel="stylesheet" href="../CSS/cart.css">
</head>
<body class="cart-body">
    <nav class="sidebar">
        <div class="logo-container">
            <span class="logo-icon">S</span>
            <span class="logo-text">InkStream</span>
        </div>
        <ul class="nav-links">
            <li><a href="products.html">Library</a></li>
            <li><a href="#" class="active">Cart</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="content-header">
            <h1 id="welcome-user">Your Digital Bag</h1>
            <p class="subtitle">Review your ebooks before streaming</p>
        </header>

        <section class="cart-container">
            <div id="cart-items" class="cart-items-list">
                </div>

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div class="summary-row"><span>Subtotal</span> <span id="subtotal">$0.00</span></div>
                <div class="summary-row"><span>Tax (GCT 15%)</span> <span id="tax">$0.00</span></div>
                <div class="summary-row"><span>Discount (10%)</span> <span id="discount">-$0.00</span></div>
                <hr>
                <div class="summary-row total"><span>Total</span> <span id="grand-total">$0.00</span></div>
                <button class="btn-primary" class="jsFont" onclick="proceedToCheckout()">Proceed to Checkout</button>
            </div>
        </section>
    </main>
    <script src="cart.js"></script>
</body>
</html>
