<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Varela+Round&display=swap" rel="stylesheet">
    <title>InkStream E-Books - Login</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="login-page">

    <nav class="sidebar">
        <div class="logo-container">
            <span class="logo-icon">S</span>
            <span class="logo-text">InkStream</span>
        </div>
    </nav>

    <main class="main-content">
        <section class="auth-container">
            <form id="loginForm" class="auth-form">
                <h2>Sign In</h2>
                <p>Access your digital library</p>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
                
                <p class="auth-footer">
                    New to InkStream? <a href="registration.html">Register now.</a>
                </p>
            </form>
        </section>

        <footer class="site-footer">
            <p>&copy; 2026 InkStream Inc. All rights reserved.</p>
            <a href="aboutus.html">About Us</a>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
