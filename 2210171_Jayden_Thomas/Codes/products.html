<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InkStream - Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/products.css">
</head>
<body class="library-body">
    <nav class="sidebar">
        <div class="logo-container">
            <span class="logo-icon">S</span>
            <span class="logo-text">InkStream</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="content-header">
            <h1>Recommended for you</h1>
            <p class="subtitle">Fresh ebooks from our creators</p>
            
            <div class="filter-bar">
                <input type="text" id="masterSearch" onkeyup="searchBooks()" placeholder="Search by title, price, or genre...">
                
                <div class="genre-list">
                    <button class="genre-tag" onclick="filterGenre('all')">All</button>
                    <button class="genre-tag" onclick="filterGenre('Horror')">Horror</button>
                    <button class="genre-tag" onclick="filterGenre('Sci-Fi')">Sci-Fi</button>
                    <button class="genre-tag" onclick="filterGenre('CompSci')">CompSci</button>
                    <button class="genre-tag" onclick="filterGenre('Law')">Law</button>
                </div>
            </div>
        </header>

        <section id="book-grid" class="video-style-grid"></section>

        <footer class="site-footer">
            <p>&copy; 2026 InkStream Inc. All rights reserved.</p>
        </footer>
    </main>

    <script src="products.js"></script>
</body>
</html>
