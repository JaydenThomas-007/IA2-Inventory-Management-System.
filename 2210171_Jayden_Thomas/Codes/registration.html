<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Varela+Round&display=swap" rel="stylesheet">
    <title>StreamX - Register</title>
    <link rel="stylesheet" href=" ../CSS/style.css">
</head>
<body class="login-page">
    <nav class="sidebar">
        <div class="logo-container">
            <span class="logo-icon">S</span>
            <span class="logo-text">InkStream</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Login</a></li>
            <li><a href="#" class="active">Register</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="auth-container">
            <form id="registrationForm" class="auth-form">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
