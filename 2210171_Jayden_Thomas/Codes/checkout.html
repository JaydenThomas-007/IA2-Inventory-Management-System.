<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Varela+Round&display=swap" rel="stylesheet">
    <title>InkStream - Checkout</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <main class="main-content checkout-center">
        <section class="auth-container">
            <form id="checkoutForm" class="auth-form">
                <h2>Secure Checkout</h2>
                <p id="user-checkout-tag">Processing payment for: [User]</p>
                
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" id="cardName" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9101 1121" maxlength="16" required>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Expiry</label>
                        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" id="cvv" placeholder="***" maxlength="3" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Pay <span id="pay-amount"></span></button>
                <button type="button" class="btn-secondary" onclick="window.history.back()">Cancel</button>
            </form>
        </section>
    </main>
    <script src="checkout.js"></script>
</body>
</html>
